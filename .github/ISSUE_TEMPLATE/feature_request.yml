name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Feature description
      description: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Why do you need this? What problem does it solve?
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New search source
        - Scoring improvement
        - Security enhancement
        - Cross-platform support
        - Installation experience
        - Other
    validations:
      required: true
  - type: dropdown
    id: contribute
    attributes:
      label: Would you like to submit a PR?
      options:
        - "Yes"
        - "Maybe, with guidance"
        - "No"
    validations:
      required: true
